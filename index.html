<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empanadas Com Payé | Corrientes</title>
<style>
  
  :root {
    --rojo: #8B0000;
    --rojo-vivo: #C0392B;
    --negro: #111111;
    --dorado: #F0C040;
    --dorado-oscuro: #C9972A;
    --crema: #FFF8E7;
    --texto: #1a1a1a;
  
  
</style>
</head>
<body>

<section id="contacto">
  <h2 class="section-title">CONTACTO</h2>
  <div class="section-line"></div>
  <div class="contact-grid">
    <div class="contact-card">
      <span class="contact-icon">📍</span>
      <h4>UBICACIÓN</h4>
      <p>Corrientes Capital, Argentina</p>
    </div>
    <div class="contact-card">
      <span class="contact-icon">📱</span>
      <h4>WHATSAPP</h4>
      <a href="https://wa.me/5493794011998" target="_blank">3794 01 1998</a>
    </div>
    <div class="contact-card">
      <span class="contact-icon">⏰</span>
      <h4>HORARIOS</h4>
      <p>Mar a Dom: 19:00 - 23:30</p>
    </div>
  </div>
</section>

<script>
  let cantidad = 1;

  function cambiarCantidad(d) {
    cantidad = Math.max(1, cantidad + d);
    document.getElementById('cantidadDisplay').textContent = cantidad;
  }

  function enviarPedido() {
    const nombre    = document.getElementById('nombre').value.trim();
    const telefono  = document.getElementById('telefono').value.trim();
    const ubicacion = document.getElementById('ubicacion').value.trim();
    const producto  = document.getElementById('producto').value;
    const notas     = document.getElementById('notas').value.trim();

    if (!nombre || !telefono || !ubicacion || !producto) {
      alert('⚠️ Por favor completá todos los campos obligatorios antes de enviar.');
      return;
    }

    const msg = [
      '🫔 *NUEVO PEDIDO - Empanadas Com Payé*',
      '',
      '👤 *Nombre:* ' + nombre,
      '📞 *Teléfono:* ' + telefono,
      '📍 *Dirección:* ' + ubicacion,
      '🛒 *Producto:* ' + producto,
      '🔢 *Cantidad:* ' + cantidad,
      notas ? '📝 *Notas:* ' + notas : '',
      '',
      '✅ Pedido enviado desde la web'
    ].filter(l => l !== undefined && !(l === '' && !notas)).join('\n');

    
    const url = 'https://wa.me/5493794011998?text=' + encodeURIComponent(msg);

    const toast = document.getElementById('toast');
    toast.classList.add('show');
    
    setTimeout(() => {
      window.open(url, '_blank');
      toast.classList.remove('show');
    }, 1500);
  }
</script>

</body>
</html>
